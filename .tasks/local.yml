version: '3'

vars:
  REDPANDA_CLIENT_ID: '{{.REDPANDA_CLIENT_ID | default ""}}'
  REDPANDA_CLIENT_SECRET: '{{.REDPANDA_CLIENT_SECRET | default ""}}'
  REDPANDA_CLOUD_ENVIRONMENT: '{{.REDPANDA_CLOUD_ENVIRONMENT | default "pre"}}'
  TF_LOG: '{{.TF_LOG | default "WARN"}}'
  GOOGLE_CREDENTIALS_BASE64: '{{.GOOGLE_CREDENTIALS_BASE64 | default ""}}'

tasks:
  build:
    desc: "Build and install provider for local testing to specified directory"
    vars:
      TARGET_DIR: '{{.TARGET_DIR | default ""}}'
    cmds:
      - echo "Building terraform provider..."
      - go build -o terraform-provider-redpanda
      - echo "Installing provider to {{.TARGET_DIR}}..."
      - |
        if [ -z "{{.TARGET_DIR}}" ]; then
          # Install to content root only when no target directory is specified
          mkdir -p .terraform.d/plugins/registry.terraform.io/hashicorp/redpanda/0.7.1/darwin_arm64
          cp terraform-provider-redpanda .terraform.d/plugins/registry.terraform.io/hashicorp/redpanda/0.7.1/darwin_arm64/terraform-provider-redpanda_v0.7.1
          echo "Installed to content root"
        else
          # Install to specified target directory
          if [ -d "{{.TARGET_DIR}}" ]; then
            mkdir -p "{{.TARGET_DIR}}/.terraform.d/plugins/registry.terraform.io/hashicorp/redpanda/0.7.1/darwin_arm64"
            cp terraform-provider-redpanda "{{.TARGET_DIR}}/.terraform.d/plugins/registry.terraform.io/hashicorp/redpanda/0.7.1/darwin_arm64/terraform-provider-redpanda_v0.7.1"

            # Create plugin_path file
            mkdir -p "{{.TARGET_DIR}}/.terraform"
            echo '[".terraform.d/plugins"]' > "{{.TARGET_DIR}}/.terraform/plugin_path"

            echo "Installed to {{.TARGET_DIR}}"
          else
            echo "Error: Target directory {{.TARGET_DIR}} does not exist"
            exit 1
          fi
        fi

  cluster:aws:apply:
    desc: "Apply AWS cluster for local testing"
    deps:
      - task: build
        vars:
          TARGET_DIR: examples/cluster/aws
    dir: examples/cluster/aws
    vars:
      CLUSTER_NAME: 'local-test-aws'
    env:
      REDPANDA_CLIENT_ID: '{{.REDPANDA_CLIENT_ID}}'
      REDPANDA_CLIENT_SECRET: '{{.REDPANDA_CLIENT_SECRET}}'
      REDPANDA_CLOUD_ENVIRONMENT: '{{.REDPANDA_CLOUD_ENVIRONMENT}}'
      TF_LOG: '{{.TF_LOG}}'
      TF_INSECURE_SKIP_PROVIDER_VERIFICATION: 'true'
      TF_PLUGIN_CACHE_DIR: '.terraform.d/plugins_cache'
    cmds:
      - echo "Creating AWS cluster {{.CLUSTER_NAME}}"
      - rm -f .terraform.lock.hcl
      - terraform init -plugin-dir=.terraform.d/plugins
      - |
        if grep -q "resource \"redpanda_cluster\"" *.tf; then
          terraform apply -auto-approve \
            -var="resource_group_name={{.CLUSTER_NAME}}" \
            -var="network_name={{.CLUSTER_NAME}}" \
            -var="cluster_name={{.CLUSTER_NAME}}"
        elif grep -q "resource \"redpanda_serverless_cluster\"" *.tf; then
          terraform apply -auto-approve \
            -var="resource_group_name={{.CLUSTER_NAME}}" \
            -var="cluster_name={{.CLUSTER_NAME}}"
        elif grep -q "data \"redpanda_serverless_regions\"" *.tf; then
          terraform apply -auto-approve
        else
          echo "Error: No supported Redpanda cluster configuration found in Terraform files."
          exit 1
        fi
      - echo "AWS cluster created successfully"

  cluster:aws:destroy:
    desc: "Destroy AWS cluster from local testing"
    dir: examples/cluster/aws
    vars:
      CLUSTER_NAME: 'local-test-aws'
    env:
      REDPANDA_CLIENT_ID: '{{.REDPANDA_CLIENT_ID}}'
      REDPANDA_CLIENT_SECRET: '{{.REDPANDA_CLIENT_SECRET}}'
      REDPANDA_CLOUD_ENVIRONMENT: '{{.REDPANDA_CLOUD_ENVIRONMENT}}'
      TF_LOG: '{{.TF_LOG}}'
      TF_INSECURE_SKIP_PROVIDER_VERIFICATION: 'true'
      TF_PLUGIN_CACHE_DIR: '.terraform.d/plugins_cache'
    cmds:
      - echo "Destroying AWS cluster {{.CLUSTER_NAME}}"
      - terraform init -plugin-dir=.terraform.d/plugins
      - |
        if grep -q "resource \"redpanda_cluster\"" *.tf; then
          terraform destroy -auto-approve \
            -var="resource_group_name={{.CLUSTER_NAME}}" \
            -var="network_name={{.CLUSTER_NAME}}" \
            -var="cluster_name={{.CLUSTER_NAME}}"
        elif grep -q "resource \"redpanda_serverless_cluster\"" *.tf; then
          terraform destroy -auto-approve \
            -var="resource_group_name={{.CLUSTER_NAME}}" \
            -var="cluster_name={{.CLUSTER_NAME}}"
        elif grep -q "data \"redpanda_serverless_regions\"" *.tf; then
          terraform destroy -auto-approve
        else
          echo "Error: No supported Redpanda cluster configuration found in Terraform files."
          exit 1
        fi
      - echo "AWS cluster destroyed successfully"


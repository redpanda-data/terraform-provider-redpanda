version: '3'

vars:
  REDPANDA_CLIENT_ID: '{{.REDPANDA_CLIENT_ID | default ""}}'
  REDPANDA_CLIENT_SECRET: '{{.REDPANDA_CLIENT_SECRET | default ""}}'
  REDPANDA_CLOUD_ENVIRONMENT: '{{.REDPANDA_CLOUD_ENVIRONMENT | default "pre"}}'
  CLUSTER_ID: '{{.CLUSTER_ID | default ""}}'
  DATASOURCE_CLUSTER_ID: '{{.DATASOURCE_CLUSTER_ID | default ""}}'
  TF_LOG: '{{.TF_LOG | default "WARN"}}'
  TIMEOUT: '{{.TIMEOUT | default "6h"}}'
  TIMEOUT_SHORT: '{{.TIMEOUT_SHORT | default "1h"}}'
  VERSION: '{{.VERSION | default "pre"}}'

tasks:
  unit:
    desc: "Run unit tests with race detector"
    cmds:
      - echo "Running unit tests..."
      - |
        DEBUG=true \
        REDPANDA_CLIENT_ID="dummy_id" \
        REDPANDA_CLIENT_SECRET="dummy_secret" \
        RUN_CLUSTER_TESTS=false \
        RUN_BYOC_TESTS=false \
        {{.PATH_PREFIX}} go test -race -short -timeout 10m ./...
      - echo "Unit tests completed successfully"

  network:
    desc: "Run network resource tests"
    deps:
      - :tools:install:terraform
    cmds:
      - echo "Running TestAccResourcesNetwork..."
      - |
        DEBUG=true \
        REDPANDA_CLIENT_ID="{{.REDPANDA_CLIENT_ID}}" \
        REDPANDA_CLIENT_SECRET="{{.REDPANDA_CLIENT_SECRET}}" \
        TF_ACC=true \
        TF_LOG={{.TF_LOG}} \
        VERSION={{.VERSION}} \
        {{.PATH_PREFIX}} go test -v -timeout={{.TIMEOUT_SHORT}} ./redpanda/tests -run TestAccResourcesNetwork
      - echo "Network tests completed successfully"

  datasource:
    desc: "Run datasource tests against existing cluster"
    deps:
      - :tools:install:terraform
    cmds:
      - echo "Running TestAccResourcesDataSource..."
      - |
        DEBUG=true \
        REDPANDA_CLIENT_ID="{{.REDPANDA_CLIENT_ID}}" \
        REDPANDA_CLIENT_SECRET="{{.REDPANDA_CLIENT_SECRET}}" \
        TEST_AGAINST_EXISTING_CLUSTER=true \
        CLUSTER_ID="{{.DATASOURCE_CLUSTER_ID}}" \
        TF_ACC=true \
        TF_LOG={{.TF_LOG}} \
        VERSION={{.VERSION}} \
        {{.PATH_PREFIX}} go test -v -timeout={{.TIMEOUT_SHORT}} ./redpanda/tests -run TestAccResourcesDataSource
      - echo "Datasource tests completed successfully"

  datasource:cluster:
    desc: "Run cluster datasource acceptance test (creates cluster + reads via datasource)"
    deps:
      - :tools:install:terraform
    cmds:
      - echo "Running TestAccDataSourceCluster..."
      - |
        DEBUG=true \
        REDPANDA_CLIENT_ID="{{.REDPANDA_CLIENT_ID}}" \
        REDPANDA_CLIENT_SECRET="{{.REDPANDA_CLIENT_SECRET}}" \
        RUN_CLUSTER_TESTS=true \
        TF_ACC=true \
        TF_LOG={{.TF_LOG}} \
        VERSION={{.VERSION}} \
        {{.PATH_PREFIX}} go test -v -timeout={{.TIMEOUT}} ./redpanda/tests -run TestAccDataSourceCluster
      - echo "Cluster datasource tests completed successfully"

  cluster:aws:
    desc: "Run AWS cluster acceptance tests"
    deps:
      - :tools:install:terraform
    cmds:
      - echo "Running TestAccResourcesClusterAWS..."
      - |
        DEBUG=true \
        REDPANDA_CLIENT_ID="{{.REDPANDA_CLIENT_ID}}" \
        REDPANDA_CLIENT_SECRET="{{.REDPANDA_CLIENT_SECRET}}" \
        RUN_CLUSTER_TESTS=true \
        TF_ACC=true \
        TF_LOG={{.TF_LOG}} \
        VERSION={{.VERSION}} \
        {{.PATH_PREFIX}} go test -v -timeout={{.TIMEOUT}} ./redpanda/tests -run TestAccResourcesClusterAWS
      - echo "AWS cluster tests completed successfully"

  cluster:azure:
    desc: "Run Azure cluster acceptance tests"
    deps:
      - :tools:install:terraform
    cmds:
      - echo "Running TestAccResourcesClusterAzure..."
      - |
        DEBUG=true \
        REDPANDA_CLIENT_ID="{{.REDPANDA_CLIENT_ID}}" \
        REDPANDA_CLIENT_SECRET="{{.REDPANDA_CLIENT_SECRET}}" \
        RUN_CLUSTER_TESTS=true \
        TF_ACC=true \
        TF_LOG={{.TF_LOG}} \
        VERSION={{.VERSION}} \
        {{.PATH_PREFIX}} go test -v -timeout={{.TIMEOUT}} ./redpanda/tests -run TestAccResourcesClusterAzure
      - echo "Azure cluster tests completed successfully"

  cluster:gcp:
    desc: "Run GCP cluster acceptance tests"
    deps:
      - :tools:install:terraform
    cmds:
      - echo "Running TestAccResourcesClusterGCP..."
      - |
        DEBUG=true \
        REDPANDA_CLIENT_ID="{{.REDPANDA_CLIENT_ID}}" \
        REDPANDA_CLIENT_SECRET="{{.REDPANDA_CLIENT_SECRET}}" \
        RUN_CLUSTER_TESTS=true \
        TF_ACC=true \
        TF_LOG={{.TF_LOG}} \
        VERSION={{.VERSION}} \
        {{.PATH_PREFIX}} go test -v -timeout={{.TIMEOUT}} ./redpanda/tests -run TestAccResourcesClusterGCP
      - echo "GCP cluster tests completed successfully"

  byoc:aws:
    desc: "Run AWS BYOC acceptance tests"
    deps:
      - :tools:install:terraform
    cmds:
      - echo "Running TestAccResourcesByocAWS..."
      - |
        DEBUG=true \
        REDPANDA_CLIENT_ID="{{.REDPANDA_CLIENT_ID}}" \
        REDPANDA_CLIENT_SECRET="{{.REDPANDA_CLIENT_SECRET}}" \
        RUN_BYOC_TESTS=true \
        TF_ACC=true \
        TF_LOG={{.TF_LOG}} \
        VERSION={{.VERSION}} \
        {{.PATH_PREFIX}} go test -v -timeout={{.TIMEOUT}} ./redpanda/tests -run TestAccResourcesByocAWS
      - echo "AWS BYOC tests completed successfully"

  byovpc:aws:
    desc: "Provision BYOVPC AWS infra, run TestAccResourcesByoVpcAWS, tear down infra (always)"
    deps:
      - :tools:install:terraform
    vars:
      AWS_REGION: '{{.AWS_REGION | default "us-east-2"}}'
    cmds:
      - echo "Provisioning BYOVPC AWS test infra..."
      - |
        cd redpanda/tests/infra/network/aws
        terraform init
        terraform apply -auto-approve -var "region={{.AWS_REGION}}"
      - echo "Running TestAccResourcesByoVpcAWS..."
      - |
        set -euo pipefail
        INPUTS=$(cat redpanda/tests/infra/network/aws/inputs.json)
        DEBUG=true \
        RUN_BYOVPC_TESTS=true \
        TF_ACC=true \
        TF_LOG={{.TF_LOG}} \
        VERSION={{.VERSION}} \
        REDPANDA_CLIENT_ID="{{.REDPANDA_CLIENT_ID}}" \
        REDPANDA_CLIENT_SECRET="{{.REDPANDA_CLIENT_SECRET}}" \
        AWS_REGION="{{.AWS_REGION}}" \
        AWS_ZONES="$(echo "$INPUTS" | jq -r '.zones')" \
        RP_MANAGEMENT_BUCKET_ARN="$(echo "$INPUTS" | jq -r '.management_bucket_arn')" \
        RP_DYNAMODB_TABLE_ARN="$(echo "$INPUTS" | jq -r '.dynamodb_table_arn')" \
        RP_VPC_ARN="$(echo "$INPUTS" | jq -r '.vpc_arn')" \
        RP_PRIVATE_SUBNET_ARNS="$(echo "$INPUTS" | jq -r '.private_subnet_arns')" \
        RP_PERMISSIONS_BOUNDARY_POLICY_ARN="$(echo "$INPUTS" | jq -r '.permissions_boundary_policy_arn')" \
        RP_AGENT_INSTANCE_PROFILE_ARN="$(echo "$INPUTS" | jq -r '.agent_instance_profile_arn')" \
        RP_CONNECTORS_NODE_GROUP_INSTANCE_PROFILE_ARN="$(echo "$INPUTS" | jq -r '.connectors_node_group_instance_profile_arn')" \
        RP_UTILITY_NODE_GROUP_INSTANCE_PROFILE_ARN="$(echo "$INPUTS" | jq -r '.utility_node_group_instance_profile_arn')" \
        RP_REDPANDA_NODE_GROUP_INSTANCE_PROFILE_ARN="$(echo "$INPUTS" | jq -r '.redpanda_node_group_instance_profile_arn')" \
        RP_K8S_CLUSTER_ROLE_ARN="$(echo "$INPUTS" | jq -r '.k8s_cluster_role_arn')" \
        RP_REDPANDA_AGENT_SECURITY_GROUP_ARN="$(echo "$INPUTS" | jq -r '.redpanda_agent_security_group_arn')" \
        RP_CONNECTORS_SECURITY_GROUP_ARN="$(echo "$INPUTS" | jq -r '.connectors_security_group_arn')" \
        RP_REDPANDA_NODE_GROUP_SECURITY_GROUP_ARN="$(echo "$INPUTS" | jq -r '.redpanda_node_group_security_group_arn')" \
        RP_UTILITY_SECURITY_GROUP_ARN="$(echo "$INPUTS" | jq -r '.utility_security_group_arn')" \
        RP_CLUSTER_SECURITY_GROUP_ARN="$(echo "$INPUTS" | jq -r '.cluster_security_group_arn')" \
        RP_NODE_SECURITY_GROUP_ARN="$(echo "$INPUTS" | jq -r '.node_security_group_arn')" \
        RP_CLOUD_STORAGE_BUCKET_ARN="$(echo "$INPUTS" | jq -r '.cloud_storage_bucket_arn')" \
        {{.PATH_PREFIX}} go test -v -timeout={{.TIMEOUT}} ./redpanda/tests -run TestAccResourcesByoVpcAWS
      - echo "BYOVPC AWS tests completed successfully"
    defer:
      - task: cleanup:aws:ci
        vars:
          AWS_REGION: '{{.AWS_REGION}}'

  byoc:azure:
    desc: "Run Azure BYOC acceptance tests"
    deps:
      - :tools:install:terraform
    cmds:
      - echo "Running TestAccResourcesByocAzure..."
      - |
        DEBUG=true \
        REDPANDA_CLIENT_ID="{{.REDPANDA_CLIENT_ID}}" \
        REDPANDA_CLIENT_SECRET="{{.REDPANDA_CLIENT_SECRET}}" \
        RUN_BYOC_TESTS=true \
        TF_ACC=true \
        TF_LOG={{.TF_LOG}} \
        VERSION={{.VERSION}} \
        {{.PATH_PREFIX}} go test -v -timeout={{.TIMEOUT}} ./redpanda/tests -run TestAccResourcesByocAzure
      - echo "Azure BYOC tests completed successfully"

  byoc:gcp:
    desc: "Run GCP BYOC acceptance tests"
    deps:
      - :tools:install:terraform
    cmds:
      - echo "Running TestAccResourcesByocGCP..."
      - |
        DEBUG=true \
        REDPANDA_CLIENT_ID="{{.REDPANDA_CLIENT_ID}}" \
        REDPANDA_CLIENT_SECRET="{{.REDPANDA_CLIENT_SECRET}}" \
        RUN_BYOC_TESTS=true \
        TF_ACC=true \
        TF_LOG={{.TF_LOG}} \
        VERSION={{.VERSION}} \
        {{.PATH_PREFIX}} go test -v -timeout={{.TIMEOUT}} ./redpanda/tests -run TestAccResourcesByocGCP
      - echo "GCP BYOC tests completed successfully"

  serverless:aws:public:
    desc: "Run serverless cluster tests (AWS, public only)"
    deps:
      - :tools:install:terraform
    cmds:
      - echo "Running TestAccResourcesServerlessClusterAWSPublic..."
      - |
        DEBUG=true \
        REDPANDA_CLIENT_ID="{{.REDPANDA_CLIENT_ID}}" \
        REDPANDA_CLIENT_SECRET="{{.REDPANDA_CLIENT_SECRET}}" \
        RUN_SERVERLESS_TESTS=true \
        TF_ACC=true \
        TF_LOG={{.TF_LOG}} \
        VERSION={{.VERSION}} \
        {{.PATH_PREFIX}} go test -v -timeout={{.TIMEOUT}} ./redpanda/tests -run TestAccResourcesServerlessClusterAWSPublic
      - echo "Serverless cluster AWS public tests completed successfully"

  serverless:gcp:
    desc: "Run serverless cluster tests (GCP, public only)"
    deps:
      - :tools:install:terraform
    cmds:
      - echo "Running TestAccResourcesServerlessClusterGCP..."
      - |
        DEBUG=true \
        REDPANDA_CLIENT_ID="{{.REDPANDA_CLIENT_ID}}" \
        REDPANDA_CLIENT_SECRET="{{.REDPANDA_CLIENT_SECRET}}" \
        RUN_SERVERLESS_TESTS=true \
        TF_ACC=true \
        TF_LOG={{.TF_LOG}} \
        VERSION={{.VERSION}} \
        {{.PATH_PREFIX}} go test -v -timeout={{.TIMEOUT}} ./redpanda/tests -run TestAccResourcesServerlessClusterGCP
      - echo "Serverless cluster GCP tests completed successfully"

  serverless:aws:private:
    desc: "Run serverless cluster tests (AWS, private only)"
    deps:
      - :tools:install:terraform
    cmds:
      - echo "Running TestAccResourcesServerlessClusterAWSPrivate..."
      - |
        DEBUG=true \
        REDPANDA_CLIENT_ID="{{.REDPANDA_CLIENT_ID}}" \
        REDPANDA_CLIENT_SECRET="{{.REDPANDA_CLIENT_SECRET}}" \
        RUN_SERVERLESS_TESTS=true \
        TF_ACC=true \
        TF_LOG={{.TF_LOG}} \
        VERSION={{.VERSION}} \
        {{.PATH_PREFIX}} go test -v -timeout={{.TIMEOUT}} ./redpanda/tests -run TestAccResourcesServerlessClusterAWSPrivate
      - echo "Serverless cluster AWS private tests completed successfully"

  serverless:aws:both:
    desc: "Run serverless cluster tests (AWS, public and private)"
    deps:
      - :tools:install:terraform
    cmds:
      - echo "Running TestAccResourcesServerlessClusterAWSBoth..."
      - |
        DEBUG=true \
        REDPANDA_CLIENT_ID="{{.REDPANDA_CLIENT_ID}}" \
        REDPANDA_CLIENT_SECRET="{{.REDPANDA_CLIENT_SECRET}}" \
        RUN_SERVERLESS_TESTS=true \
        TF_ACC=true \
        TF_LOG={{.TF_LOG}} \
        VERSION={{.VERSION}} \
        {{.PATH_PREFIX}} go test -v -timeout={{.TIMEOUT}} ./redpanda/tests -run TestAccResourcesServerlessClusterAWSBoth
      - echo "Serverless cluster AWS both tests completed successfully"

  serverless:regions:
    desc: "Run serverless regions data source tests"
    deps:
      - :tools:install:terraform
    cmds:
      - echo "Running TestAccDataSourceServerlessRegions..."
      - |
        DEBUG=true \
        REDPANDA_CLIENT_ID="{{.REDPANDA_CLIENT_ID}}" \
        REDPANDA_CLIENT_SECRET="{{.REDPANDA_CLIENT_SECRET}}" \
        RUN_SERVERLESS_TESTS=true \
        TF_ACC=true \
        TF_LOG={{.TF_LOG}} \
        VERSION={{.VERSION}} \
        {{.PATH_PREFIX}} go test -v -timeout={{.TIMEOUT}} ./redpanda/tests -run TestAccDataSourceServerlessRegions
      - echo "Serverless regions tests completed successfully"

  serverless:privatelink:
    desc: "Run serverless private link tests"
    deps:
      - :tools:install:terraform
    cmds:
      - echo "Running TestAccServerlessPrivateLink..."
      - |
        DEBUG=true \
        REDPANDA_CLIENT_ID="{{.REDPANDA_CLIENT_ID}}" \
        REDPANDA_CLIENT_SECRET="{{.REDPANDA_CLIENT_SECRET}}" \
        RUN_SERVERLESS_TESTS=true \
        TF_ACC=true \
        TF_LOG={{.TF_LOG}} \
        VERSION={{.VERSION}} \
        {{.PATH_PREFIX}} go test -v -timeout={{.TIMEOUT}} ./redpanda/tests -run TestAccServerlessPrivateLink
      - echo "Serverless private link tests completed successfully"

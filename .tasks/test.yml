version: '3'

vars:
  REDPANDA_CLIENT_ID: '{{.REDPANDA_CLIENT_ID | default ""}}'
  REDPANDA_CLIENT_SECRET: '{{.REDPANDA_CLIENT_SECRET | default ""}}'
  REDPANDA_CLOUD_ENVIRONMENT: '{{.REDPANDA_CLOUD_ENVIRONMENT | default "pre"}}'
  CLUSTER_ID: '{{.CLUSTER_ID | default ""}}'
  DATASOURCE_CLUSTER_ID: '{{.DATASOURCE_CLUSTER_ID | default ""}}'
  TF_LOG: '{{.TF_LOG | default "WARN"}}'
  TIMEOUT: '{{.TIMEOUT | default "6h"}}'
  TIMEOUT_SHORT: '{{.TIMEOUT_SHORT | default "1h"}}'
  VERSION: '{{.VERSION | default "pre"}}'

tasks:
  unit:
    desc: "Run unit tests"
    deps:
      - :tools:install:go
      - :tools:install:terraform
    cmds:
      - echo "Running unit tests..."
      - |
        DEBUG=true \
        REDPANDA_CLIENT_ID="dummy_id" \
        REDPANDA_CLIENT_SECRET="dummy_secret" \
        TF_ACC_TERRAFORM_PATH="{{.BUILD_ROOT}}/bin/terraform" \
        {{.PATH_PREFIX}} go test -race -short -timeout 10m ./...
      - echo "Unit tests completed successfully"

  integration:
    desc: "Run integration tests"
    deps:
      - :tools:install:go
      - :tools:install:terraform
    cmds:
      - echo "Running integration tests..."
      - |
        DEBUG=true \
        REDPANDA_CLIENT_ID="dummy_id" \
        REDPANDA_CLIENT_SECRET="dummy_secret" \
        TF_ACC_TERRAFORM_PATH="{{.BUILD_ROOT}}/bin/terraform" \
        {{.PATH_PREFIX}} go test -race -count=1 -tags=integration -timeout 15m -run '^TestIntegration_' ./...
      - echo "Integration tests completed successfully"

  network:
    desc: "Run network resource tests"
    deps:
      - :tools:install:terraform
    cmds:
      - echo "Running network live-acc tests..."
      - |
        DEBUG=true \
        REDPANDA_CLIENT_ID="{{.REDPANDA_CLIENT_ID}}" \
        REDPANDA_CLIENT_SECRET="{{.REDPANDA_CLIENT_SECRET}}" \
        TF_ACC=true \
        TF_LOG={{.TF_LOG}} \
        VERSION={{.VERSION}} \
        {{.PATH_PREFIX}} go test \
          -count=1 -tags=live_test,network -v -timeout={{.TIMEOUT_SHORT}} \
          ./redpanda/resources/network/...
      - echo "Network tests completed successfully"

  service_account:
    desc: "Run service account live-acc tests (control-plane only, no cluster needed)"
    deps:
      - :tools:install:terraform
    cmds:
      - echo "Running service account live-acc tests..."
      - |
        DEBUG=true \
        REDPANDA_CLIENT_ID="{{.REDPANDA_CLIENT_ID}}" \
        REDPANDA_CLIENT_SECRET="{{.REDPANDA_CLIENT_SECRET}}" \
        TF_ACC=true \
        TF_LOG={{.TF_LOG}} \
        VERSION={{.VERSION}} \
        {{.PATH_PREFIX}} go test \
          -count=1 -tags=live_test,service_account -v -timeout={{.TIMEOUT_SHORT}} \
          ./redpanda/resources/serviceaccount/...
      - echo "Service account tests completed successfully"

  shadowlink:
    desc: "Run shadow link acceptance test (provisions two dedicated AWS clusters + link)"
    deps:
      - :tools:install:terraform
    cmds:
      - echo "Running shadow link live-acc tests..."
      - |
        DEBUG=true \
        REDPANDA_CLIENT_ID="{{.REDPANDA_CLIENT_ID}}" \
        REDPANDA_CLIENT_SECRET="{{.REDPANDA_CLIENT_SECRET}}" \
        TF_ACC=true \
        TF_LOG={{.TF_LOG}} \
        VERSION={{.VERSION}} \
        {{.PATH_PREFIX}} go test \
          -count=1 -tags=live_test,shadowlink -v -timeout={{.TIMEOUT}} \
          ./redpanda/resources/shadowlink/...
      - echo "Shadow link tests completed successfully"

  datasource:
    desc: "Run datasource tests against existing cluster (parametric mode; stays env-driven)"
    deps:
      - :tools:install:terraform
    cmds:
      - echo "Running TestAcc_DataSource_Runner..."
      - |
        DEBUG=true \
        REDPANDA_CLIENT_ID="{{.REDPANDA_CLIENT_ID}}" \
        REDPANDA_CLIENT_SECRET="{{.REDPANDA_CLIENT_SECRET}}" \
        TEST_AGAINST_EXISTING_CLUSTER=true \
        CLUSTER_ID="{{.DATASOURCE_CLUSTER_ID}}" \
        TF_ACC=true \
        TF_LOG={{.TF_LOG}} \
        VERSION={{.VERSION}} \
        {{.PATH_PREFIX}} go test \
          -count=1 -v -timeout={{.TIMEOUT_SHORT}} -run TestAcc_DataSource_Runner \
          ./redpanda/tests
      - echo "Datasource tests completed successfully"

  datasource:cluster:
    desc: "Run cluster datasource acceptance test (creates cluster + reads via datasource)"
    deps:
      - :tools:install:terraform
    cmds:
      - echo "Running cluster datasource live-acc tests..."
      - |
        DEBUG=true \
        REDPANDA_CLIENT_ID="{{.REDPANDA_CLIENT_ID}}" \
        REDPANDA_CLIENT_SECRET="{{.REDPANDA_CLIENT_SECRET}}" \
        TF_ACC=true \
        TF_LOG={{.TF_LOG}} \
        VERSION={{.VERSION}} \
        {{.PATH_PREFIX}} go test \
          -count=1 -tags=live_test,datasource_cluster -v -timeout={{.TIMEOUT}} \
          ./redpanda/resources/cluster/...
      - echo "Cluster datasource tests completed successfully"

  cluster:aws:
    desc: "Run AWS cluster acceptance tests"
    deps:
      - :tools:install:terraform
    cmds:
      - echo "Running AWS cluster live-acc tests..."
      - |
        DEBUG=true \
        REDPANDA_CLIENT_ID="{{.REDPANDA_CLIENT_ID}}" \
        REDPANDA_CLIENT_SECRET="{{.REDPANDA_CLIENT_SECRET}}" \
        TF_ACC=true \
        TF_LOG={{.TF_LOG}} \
        VERSION={{.VERSION}} \
        {{.PATH_PREFIX}} go test \
          -count=1 -tags=live_test,cluster_aws -v -timeout={{.TIMEOUT}} \
          ./redpanda/tests/ \
          ./redpanda/resources/schema/... \
          ./redpanda/resources/schemaregistryacl/... \
          ./redpanda/resources/user/...
      - echo "AWS cluster tests completed successfully"

  cluster:gcp:
    desc: "Run GCP cluster acceptance tests"
    deps:
      - :tools:install:terraform
    cmds:
      - echo "Running GCP cluster live-acc tests..."
      - |
        DEBUG=true \
        REDPANDA_CLIENT_ID="{{.REDPANDA_CLIENT_ID}}" \
        REDPANDA_CLIENT_SECRET="{{.REDPANDA_CLIENT_SECRET}}" \
        TF_ACC=true \
        TF_LOG={{.TF_LOG}} \
        VERSION={{.VERSION}} \
        {{.PATH_PREFIX}} go test \
          -count=1 -tags=live_test,cluster_gcp -v -timeout={{.TIMEOUT}} \
          ./redpanda/tests/
      - echo "GCP cluster tests completed successfully"

  byoc:aws:
    desc: "Run AWS BYOC acceptance tests"
    deps:
      - :tools:install:terraform
    cmds:
      - echo "Running AWS BYOC live-acc tests..."
      - |
        DEBUG=true \
        REDPANDA_CLIENT_ID="{{.REDPANDA_CLIENT_ID}}" \
        REDPANDA_CLIENT_SECRET="{{.REDPANDA_CLIENT_SECRET}}" \
        TF_ACC=true \
        TF_LOG={{.TF_LOG}} \
        VERSION={{.VERSION}} \
        {{.PATH_PREFIX}} go test \
          -count=1 -tags=live_test,byoc_aws -v -timeout={{.TIMEOUT}} \
          ./redpanda/tests/
      - echo "AWS BYOC tests completed successfully"

  byovpc:aws:
    desc: "Provision BYOVPC AWS infra, run TestAcc_Cluster_BYOVPC_AWS, tear down infra (always)"
    deps:
      - :tools:install:terraform
    vars:
      AWS_REGION: '{{.AWS_REGION | default "us-east-2"}}'
    cmds:
      - echo "Provisioning BYOVPC AWS test infra..."
      - |
        export PATH="{{.BUILD_ROOT}}/bin:$PATH"
        cd redpanda/tests/testdata/network/aws
        terraform init
        terraform apply -auto-approve -var "region={{.AWS_REGION}}"
      - echo "Running AWS BYOVPC live-acc tests..."
      - |
        set -euo pipefail
        INPUTS=$(cat redpanda/tests/testdata/network/aws/inputs.json)
        DEBUG=true \
        TF_ACC=true \
        TF_LOG={{.TF_LOG}} \
        VERSION={{.VERSION}} \
        REDPANDA_CLIENT_ID="{{.REDPANDA_CLIENT_ID}}" \
        REDPANDA_CLIENT_SECRET="{{.REDPANDA_CLIENT_SECRET}}" \
        AWS_REGION="{{.AWS_REGION}}" \
        AWS_ZONES="$(echo "$INPUTS" | jq -r '.zones')" \
        RP_MANAGEMENT_BUCKET_ARN="$(echo "$INPUTS" | jq -r '.management_bucket_arn')" \
        RP_DYNAMODB_TABLE_ARN="$(echo "$INPUTS" | jq -r '.dynamodb_table_arn')" \
        RP_VPC_ARN="$(echo "$INPUTS" | jq -r '.vpc_arn')" \
        RP_PRIVATE_SUBNET_ARNS="$(echo "$INPUTS" | jq -r '.private_subnet_arns')" \
        RP_PERMISSIONS_BOUNDARY_POLICY_ARN="$(echo "$INPUTS" | jq -r '.permissions_boundary_policy_arn')" \
        RP_AGENT_INSTANCE_PROFILE_ARN="$(echo "$INPUTS" | jq -r '.agent_instance_profile_arn')" \
        RP_CONNECTORS_NODE_GROUP_INSTANCE_PROFILE_ARN="$(echo "$INPUTS" | jq -r '.connectors_node_group_instance_profile_arn')" \
        RP_UTILITY_NODE_GROUP_INSTANCE_PROFILE_ARN="$(echo "$INPUTS" | jq -r '.utility_node_group_instance_profile_arn')" \
        RP_REDPANDA_NODE_GROUP_INSTANCE_PROFILE_ARN="$(echo "$INPUTS" | jq -r '.redpanda_node_group_instance_profile_arn')" \
        RP_K8S_CLUSTER_ROLE_ARN="$(echo "$INPUTS" | jq -r '.k8s_cluster_role_arn')" \
        RP_REDPANDA_AGENT_SECURITY_GROUP_ARN="$(echo "$INPUTS" | jq -r '.redpanda_agent_security_group_arn')" \
        RP_CONNECTORS_SECURITY_GROUP_ARN="$(echo "$INPUTS" | jq -r '.connectors_security_group_arn')" \
        RP_REDPANDA_NODE_GROUP_SECURITY_GROUP_ARN="$(echo "$INPUTS" | jq -r '.redpanda_node_group_security_group_arn')" \
        RP_UTILITY_SECURITY_GROUP_ARN="$(echo "$INPUTS" | jq -r '.utility_security_group_arn')" \
        RP_CLUSTER_SECURITY_GROUP_ARN="$(echo "$INPUTS" | jq -r '.cluster_security_group_arn')" \
        RP_NODE_SECURITY_GROUP_ARN="$(echo "$INPUTS" | jq -r '.node_security_group_arn')" \
        RP_CLOUD_STORAGE_BUCKET_ARN="$(echo "$INPUTS" | jq -r '.cloud_storage_bucket_arn')" \
        {{.PATH_PREFIX}} go test \
          -count=1 -tags=live_test,byovpc_aws -v -timeout={{.TIMEOUT}} \
          ./redpanda/tests/
      - echo "BYOVPC AWS tests completed successfully"
    defer:
      - task: cleanup:aws:ci
        vars:
          AWS_REGION: '{{.AWS_REGION}}'

  byoc:gcp:
    desc: "Run GCP BYOC acceptance tests"
    deps:
      - :tools:install:terraform
    cmds:
      - echo "Running GCP BYOC live-acc tests..."
      - |
        DEBUG=true \
        REDPANDA_CLIENT_ID="{{.REDPANDA_CLIENT_ID}}" \
        REDPANDA_CLIENT_SECRET="{{.REDPANDA_CLIENT_SECRET}}" \
        TF_ACC=true \
        TF_LOG={{.TF_LOG}} \
        VERSION={{.VERSION}} \
        {{.PATH_PREFIX}} go test \
          -count=1 -tags=live_test,byoc_gcp -v -timeout={{.TIMEOUT}} \
          ./redpanda/tests/
      - echo "GCP BYOC tests completed successfully"

  serverless:aws:public:
    desc: "Run serverless cluster tests (AWS, public only)"
    deps:
      - :tools:install:terraform
    cmds:
      - echo "Running AWS serverless public live-acc tests..."
      - |
        DEBUG=true \
        REDPANDA_CLIENT_ID="{{.REDPANDA_CLIENT_ID}}" \
        REDPANDA_CLIENT_SECRET="{{.REDPANDA_CLIENT_SECRET}}" \
        TF_ACC=true \
        TF_LOG={{.TF_LOG}} \
        VERSION={{.VERSION}} \
        {{.PATH_PREFIX}} go test \
          -count=1 -tags=live_test,serverless_aws_public -v -timeout={{.TIMEOUT}} \
          ./redpanda/tests/
      - echo "Serverless cluster AWS public tests completed successfully"

  serverless:gcp:
    desc: "Run serverless cluster tests (GCP, public only)"
    deps:
      - :tools:install:terraform
    cmds:
      - echo "Running GCP serverless live-acc tests..."
      - |
        DEBUG=true \
        REDPANDA_CLIENT_ID="{{.REDPANDA_CLIENT_ID}}" \
        REDPANDA_CLIENT_SECRET="{{.REDPANDA_CLIENT_SECRET}}" \
        TF_ACC=true \
        TF_LOG={{.TF_LOG}} \
        VERSION={{.VERSION}} \
        {{.PATH_PREFIX}} go test \
          -count=1 -tags=live_test,serverless_gcp -v -timeout={{.TIMEOUT}} \
          ./redpanda/tests/
      - echo "Serverless cluster GCP tests completed successfully"

  serverless:aws:private:
    desc: "Run serverless cluster tests (AWS, private only)"
    deps:
      - :tools:install:terraform
    cmds:
      - echo "Running AWS serverless private live-acc tests..."
      - |
        DEBUG=true \
        REDPANDA_CLIENT_ID="{{.REDPANDA_CLIENT_ID}}" \
        REDPANDA_CLIENT_SECRET="{{.REDPANDA_CLIENT_SECRET}}" \
        TF_ACC=true \
        TF_LOG={{.TF_LOG}} \
        VERSION={{.VERSION}} \
        {{.PATH_PREFIX}} go test \
          -count=1 -tags=live_test,serverless_aws_private -v -timeout={{.TIMEOUT}} \
          ./redpanda/tests/
      - echo "Serverless cluster AWS private tests completed successfully"

  serverless:aws:both:
    desc: "Run serverless cluster tests (AWS, public and private)"
    deps:
      - :tools:install:terraform
    cmds:
      - echo "Running AWS serverless both live-acc tests..."
      - |
        DEBUG=true \
        REDPANDA_CLIENT_ID="{{.REDPANDA_CLIENT_ID}}" \
        REDPANDA_CLIENT_SECRET="{{.REDPANDA_CLIENT_SECRET}}" \
        TF_ACC=true \
        TF_LOG={{.TF_LOG}} \
        VERSION={{.VERSION}} \
        {{.PATH_PREFIX}} go test \
          -count=1 -tags=live_test,serverless_aws_both -v -timeout={{.TIMEOUT}} \
          ./redpanda/tests/
      - echo "Serverless cluster AWS both tests completed successfully"

  serverless:regions:
    desc: "Run serverless regions data source tests"
    deps:
      - :tools:install:terraform
    cmds:
      - echo "Running serverless regions live-acc tests..."
      - |
        DEBUG=true \
        REDPANDA_CLIENT_ID="{{.REDPANDA_CLIENT_ID}}" \
        REDPANDA_CLIENT_SECRET="{{.REDPANDA_CLIENT_SECRET}}" \
        TF_ACC=true \
        TF_LOG={{.TF_LOG}} \
        VERSION={{.VERSION}} \
        {{.PATH_PREFIX}} go test \
          -count=1 -tags=live_test,serverless_regions -v -timeout={{.TIMEOUT}} \
          ./redpanda/resources/serverlessregions/...
      - echo "Serverless regions tests completed successfully"

  serverless:privatelink:
    desc: "Run serverless private link tests"
    deps:
      - :tools:install:terraform
    cmds:
      - echo "Running serverless private link live-acc tests..."
      - |
        DEBUG=true \
        REDPANDA_CLIENT_ID="{{.REDPANDA_CLIENT_ID}}" \
        REDPANDA_CLIENT_SECRET="{{.REDPANDA_CLIENT_SECRET}}" \
        TF_ACC=true \
        TF_LOG={{.TF_LOG}} \
        VERSION={{.VERSION}} \
        {{.PATH_PREFIX}} go test \
          -count=1 -tags=live_test,serverless_privatelink -v -timeout={{.TIMEOUT}} \
          ./redpanda/resources/serverlessprivatelink/...
      - echo "Serverless private link tests completed successfully"

  upgrade:
    desc: "Run non-serverless provider-upgrade tests (requires REDPANDA_CLIENT_ID + REDPANDA_CLIENT_SECRET)"
    deps:
      - :tools:install:terraform
    cmds:
      - echo "Running non-serverless provider-upgrade tests..."
      - |
        set -e
        export DEBUG=true
        export REDPANDA_CLIENT_ID="{{.REDPANDA_CLIENT_ID}}"
        export REDPANDA_CLIENT_SECRET="{{.REDPANDA_CLIENT_SECRET}}"
        export REDPANDA_CLOUD_ENVIRONMENT="{{.REDPANDA_CLOUD_ENVIRONMENT}}"
        export TF_ACC=true
        export TF_LOG={{.TF_LOG}}
        # Fast pass: control-plane + dataplane upgrade tests, skipping the slow dedicated-cluster
        # lifecycle (own pass below) and the serverless tests (task test:upgrade:serverless).
        {{.PATH_PREFIX}} go test -v -tags=upgrade -timeout={{.TIMEOUT_SHORT}} -skip '^(TestUpgrade_Cluster|TestUpgrade_ServerlessCluster|TestUpgrade_DataplaneClusterAPIURLMigration)$' ./redpanda/resources/... ./redpanda/tests/...
        # Slow pass: dedicated-cluster create+delete in its own single-package invocation so output streams live
        # and gets a timeout above the resource's own 1h30m create budget (TIMEOUT_SHORT=1h is too short).
        {{.PATH_PREFIX}} go test -v -tags=upgrade -timeout={{.TIMEOUT}} -run '^TestUpgrade_Cluster$' ./redpanda/resources/cluster/...
      - echo "Non-serverless provider-upgrade tests completed successfully"

  upgrade:serverless:
    desc: "Run serverless provider-upgrade tests (requires REDPANDA_CLIENT_ID + REDPANDA_CLIENT_SECRET)"
    deps:
      - :tools:install:terraform
    cmds:
      - echo "Running serverless provider-upgrade tests..."
      - |
        set -e
        export DEBUG=true
        export REDPANDA_CLIENT_ID="{{.REDPANDA_CLIENT_ID}}"
        export REDPANDA_CLIENT_SECRET="{{.REDPANDA_CLIENT_SECRET}}"
        export REDPANDA_CLOUD_ENVIRONMENT="{{.REDPANDA_CLOUD_ENVIRONMENT}}"
        export TF_ACC=true
        export TF_LOG={{.TF_LOG}}
        # Both upgrade tests that provision a serverless cluster: the serverless_cluster
        # resource itself and the dataplane cluster_api_url migration (serverless-backed).
        {{.PATH_PREFIX}} go test -v -tags=upgrade -timeout={{.TIMEOUT_SHORT}} -run '^(TestUpgrade_ServerlessCluster|TestUpgrade_DataplaneClusterAPIURLMigration)$' ./redpanda/resources/serverlesscluster/... ./redpanda/tests/...
      - echo "Serverless provider-upgrade tests completed successfully"

  upgrade:smoke:
    desc: "Run control-plane-only provider-upgrade tests (resource_group + network; no cluster needed)"
    deps:
      - :tools:install:terraform
    cmds:
      - echo "Running provider-upgrade smoke tests..."
      - |
        DEBUG=true \
        REDPANDA_CLIENT_ID="{{.REDPANDA_CLIENT_ID}}" \
        REDPANDA_CLIENT_SECRET="{{.REDPANDA_CLIENT_SECRET}}" \
        REDPANDA_CLOUD_ENVIRONMENT="{{.REDPANDA_CLOUD_ENVIRONMENT}}" \
        TF_ACC=true \
        TF_LOG={{.TF_LOG}} \
        {{.PATH_PREFIX}} go test -v -tags=upgrade -timeout={{.TIMEOUT_SHORT}} \
          ./redpanda/resources/resourcegroup/... \
          ./redpanda/resources/network/...
      - echo "Provider-upgrade smoke tests completed successfully"

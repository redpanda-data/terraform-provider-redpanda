      ./taskw test:byoc:aws
    plugins:
      - seek-oss/aws-sm#v2.3.2:
          json-to-env:
            - secret-id: sdlc/prod/buildkite/terraform_provider_redpanda
      - docker#v5.12.0:
          image: "golang:1.25.10"
          environment:
            - REDPANDA_CLIENT_ID
            - REDPANDA_CLIENT_SECRET
            - TF_LOG=DEBUG
            - AWS_ACCESS_KEY_ID
            - AWS_SECRET_ACCESS_KEY
    depends_on:
      - lint
      - unit
      - integration
  - label: test_byovpc_aws
    key: test_byovpc_aws
    if: build.tag == null && build.pull_request.labels includes 'ci-ready-byoc'
    command: |
      apt-get update && apt-get install -y --no-install-recommends curl unzip jq python3 pip
      pip install --break-system-packages awscli
      ./taskw test:byovpc:aws
    plugins:
      - seek-oss/aws-sm#v2.3.2:
          json-to-env:
            - secret-id: sdlc/prod/buildkite/terraform_provider_redpanda
      - docker#v5.12.0:
          image: "golang:1.25.10"
          environment:
            - REDPANDA_CLIENT_ID
            - REDPANDA_CLIENT_SECRET
            - TF_LOG=DEBUG
            - AWS_ACCESS_KEY_ID
            - AWS_SECRET_ACCESS_KEY
            - AWS_REGION=us-east-2
    depends_on:
      - lint
      - unit
      - integration
  - label: test_byoc_gcp
    key: test_byoc_gcp
    if: build.tag == null && build.pull_request.labels includes 'ci-ready-byoc'
    command: |
      ./taskw test:byoc:gcp
    plugins:
      - seek-oss/aws-sm#v2.3.2:
          json-to-env:
            - secret-id: sdlc/prod/buildkite/terraform_provider_redpanda
      - docker#v5.12.0:
          image: "golang:1.25.10"
          environment:
            - REDPANDA_CLIENT_ID
            - REDPANDA_CLIENT_SECRET
            - TF_LOG=DEBUG
            - GOOGLE_CREDENTIALS_BASE64
            - GOOGLE_PROJECT
    depends_on:
      - lint
      - unit
      - integration
  - label: cleanup_aws
    key: cleanup_aws
    if: build.tag == null && build.pull_request.labels includes 'ci-ready-byoc'
    command: |
      ./taskw cleanup:aws:ci || echo "AWS cleanup completed with errors (non-blocking)"
    plugins:
      - seek-oss/aws-sm#v2.3.2:
          json-to-env:
            - secret-id: sdlc/prod/buildkite/terraform_provider_redpanda
      - docker#v5.12.0:
          image: "golang:1.25.10"
          environment:
            - AWS_ACCESS_KEY_ID
            - AWS_SECRET_ACCESS_KEY
            - AWS_REGION=us-east-2
            - CI=true
    depends_on:
      - test_datasource_cluster
      - test_network
      - test_cluster_aws
      - test_serverless_cluster_aws_public
      - test_serverless_cluster_aws_private
      - test_serverless_private_link
      - test_byoc_aws
      - test_byovpc_aws
    allow_dependency_failure: true
    soft_fail: true
    retry:
      automatic:
        limit: 3

  - label: cleanup_gcp
    key: cleanup_gcp
    if: build.tag == null && build.pull_request.labels includes 'ci-ready-byoc'
    command: |
      ./taskw cleanup:gcp:ci PROJECT_ID="$$GOOGLE_PROJECT" || echo "GCP cleanup completed with errors (non-blocking)"
    plugins:
      - seek-oss/aws-sm#v2.3.2:
          json-to-env:
            - secret-id: sdlc/prod/buildkite/terraform_provider_redpanda
      - docker#v5.12.0:
          image: "golang:1.25.10"
          environment:
            - GOOGLE_CREDENTIALS_BASE64
            - GOOGLE_PROJECT
            - GCP_REGION=us-central1
            - CI=true
    depends_on:
      - test_cluster_gcp
      - test_serverless_cluster_gcp
      - test_byoc_gcp
    allow_dependency_failure: true
    soft_fail: true
    retry:
      automatic:
        limit: 3

  - label: cleanup_redpanda_cloud
    key: cleanup_redpanda_cloud
    if: build.tag == null && (build.pull_request.labels includes 'ci-ready' || build.pull_request.labels includes 'ci-ready-byoc' ||  build.pull_request.labels includes 'ci-ready-serverless')
    command: |
      ./taskw cleanup:redpanda || echo "Redpanda Cloud cleanup completed with errors (non-blocking)"
    plugins:
      - seek-oss/aws-sm#v2.3.2:
          json-to-env:
            - secret-id: sdlc/prod/buildkite/terraform_provider_redpanda
      - docker#v5.12.0:
          image: "golang:1.25.10"
          environment:
            - REDPANDA_CLIENT_ID
            - REDPANDA_CLIENT_SECRET
            - REDPANDA_CLOUD_ENVIRONMENT=pre
            - CI=true
    depends_on:
      - test_datasource_cluster
      - test_service_account
      - test_network
      - test_cluster_aws
      - test_cluster_gcp
      - test_serverless_cluster_aws_public
      - test_serverless_cluster_gcp
      - test_serverless_cluster_aws_private
      - test_serverless_private_link
      - test_byoc_aws
      - test_byovpc_aws
      - test_byoc_gcp
    allow_dependency_failure: true
    soft_fail: true
    retry:
      automatic:
        limit: 3

  - label: "Release"
    key: release
    if: build.tag =~ /^v[0-9]+\.[0-9]+\.[0-9]+(-.*)?$/
    concurrency: 1
    concurrency_group: "terraform-provider-redpanda/release"
    command: |
      git config --global --add safe.directory /workdir
      if ! command -v gpg >/dev/null 2>&1; then
        apt-get update -qq && apt-get install -y -qq gnupg
      fi
      ./taskw release
    plugins:
      - seek-oss/aws-sm#v2.3.2:
          json-to-env:
            - secret-id: sdlc/prod/buildkite/terraform_provider_redpanda
      - docker#v5.12.0:
          image: "golang:1.25.10"
          propagate-environment: true
          environment:
            - BUILDKITE=true
            - BUILDKITE_TAG
            - BUILDKITE_COMMIT
            - GPG_PRIVATE_KEY
            - PASSPHRASE
            - GPG_FINGERPRINT
            - GITHUB_TOKEN
    depends_on:
      - docs
      - generate
      - lint
      - unit
      - integration

      - lint
      - unit
      - integration
  - label: test_serverless_regions
    key: test_serverless_regions
    if: build.tag == null && build.pull_request.labels includes 'ci-ready-serverless'
    command: |
      ./taskw test:serverless:regions
    plugins:
      - seek-oss/aws-sm#v2.3.2:
          json-to-env:
            - secret-id: sdlc/prod/buildkite/terraform_provider_redpanda
      - docker#v5.12.0:
          image: "golang:1.25.10"
          environment:
            - REDPANDA_CLIENT_ID
            - REDPANDA_CLIENT_SECRET
            - TF_LOG=DEBUG
            - DATASOURCE_CLUSTER_ID
    depends_on:
      - lint
      - unit
      - integration
  - label: test_serverless_private_link
    key: test_serverless_private_link
    if: build.tag == null && build.pull_request.labels includes 'ci-ready-serverless'
    command: |
      ./taskw test:serverless:privatelink
    plugins:
      - seek-oss/aws-sm#v2.3.2:
          json-to-env:
            - secret-id: sdlc/prod/buildkite/terraform_provider_redpanda
      - docker#v5.12.0:
          image: "golang:1.25.10"
          environment:
            - REDPANDA_CLIENT_ID
            - REDPANDA_CLIENT_SECRET
            - TF_LOG=DEBUG

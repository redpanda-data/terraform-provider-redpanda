  - label: test_upgrade_serverless
    key: test_upgrade_serverless
    if: build.tag == null && build.pull_request.labels includes 'ci-ready-upgrade-serverless'
    command: |
      ./taskw test:upgrade:serverless
    plugins:
      - seek-oss/aws-sm#v2.3.2:
          json-to-env:
            - secret-id: sdlc/prod/buildkite/terraform_provider_redpanda
      - docker#v5.12.0:

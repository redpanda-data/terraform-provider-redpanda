  - label: test_upgrade
    key: test_upgrade
    if: build.tag == null && build.pull_request.labels includes 'ci-ready-upgrade'
    command: |
      ./taskw test:upgrade
    plugins:
      - seek-oss/aws-sm#v2.3.2:
          json-to-env:

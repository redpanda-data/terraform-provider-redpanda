agents:
  queue: cloud-m4xlarge

steps:
  - label: docs
    key: docs
    command: |
      git config --global --add safe.directory /workdir
      ./taskw docs
      if ! git diff --exit-code; then
        echo "Documentation is out of date. Run './taskw docs' locally and commit the changes."
        exit 1
      fi
    plugins:
      - docker#v5.12.0:
          image: "golang:1.25.10"
          environment:
            - BUILDKITE=true
  - label: generate
    key: generate
    command: |
      export GIT_TERMINAL_PROMPT=0
      git config --global --add safe.directory /workdir
      apt-get update -qq && apt-get install -y -qq python3-yaml
      CLOUDV2_SHA=$$(python3 -c 'import yaml; print(yaml.safe_load(open("internal/buf_dependencies.yaml"))["cloudv2"]["sha"])')
      CONSOLE_SHA=$$(python3 -c 'import yaml; print(yaml.safe_load(open("internal/buf_dependencies.yaml"))["console"]["sha"])')
      git clone "https://x-access-token:$${GITHUB_TOKEN}@github.com/redpanda-data/cloudv2.git" /workdir/../cloudv2
      git -C /workdir/../cloudv2 checkout "$$CLOUDV2_SHA"
      git clone "https://x-access-token:$${GITHUB_TOKEN}@github.com/redpanda-data/console.git" /workdir/../console
      git -C /workdir/../console checkout "$$CONSOLE_SHA"
      ./taskw generate
      if ! git diff --exit-code; then
        echo "Generated code is out of date. Run './taskw generate' locally and commit the changes."
        exit 1
      fi
    plugins:
      - seek-oss/aws-sm#v2.3.2:
          json-to-env:
            - secret-id: sdlc/prod/buildkite/terraform_provider_redpanda
      - docker#v5.12.0:
          image: "golang:1.25.10"
          environment:
            - BUILDKITE=true
            - GITHUB_TOKEN
  - label: lint
    key: lint
    command: |
      ./taskw lint
    plugins:
      - docker#v5.12.0:
          image: "golang:1.25.10"
          environment:
            - BUILDKITE=true
  - label: unit
    key: unit
    command: |
      ./taskw test:unit
    plugins:
      - docker#v5.12.0:
          image: "golang:1.25.10"
    depends_on:
      - docs
      - generate
      - lint

  - label: integration
    key: integration
    command: |
      ./taskw test:integration
    plugins:
      - docker#v5.12.0:
          image: "golang:1.25.10"
    depends_on:
      - docs
      - generate
      - lint

  - label: ready
    key: ready
    command: |
      git config --global --add safe.directory /workdir
      ./taskw ready
      if git status --porcelain | grep -q .; then
        echo "task ready produced uncommitted changes:"
        git status --porcelain
        git --no-pager diff
        exit 1
      fi
    plugins:
      - docker#v5.12.0:
          image: "golang:1.25.10"
          environment:
            - BUILDKITE=true
    depends_on:
      - lint

  - label: apidescriptions:check
    key: apidescriptions_check
    command: |
      export GIT_TERMINAL_PROMPT=0
      git config --global --add safe.directory /workdir
      : "$${GITHUB_TOKEN:?GITHUB_TOKEN is empty - verify the secret sdlc/prod/buildkite/terraform_provider_redpanda has a GITHUB_TOKEN key}"
      apt-get update -qq && apt-get install -y -qq python3-yaml
      CLOUDV2_SHA=$$(python3 -c 'import yaml; print(yaml.safe_load(open("internal/buf_dependencies.yaml"))["cloudv2"]["sha"])')
      CONSOLE_SHA=$$(python3 -c 'import yaml; print(yaml.safe_load(open("internal/buf_dependencies.yaml"))["console"]["sha"])')
      git clone "https://x-access-token:$${GITHUB_TOKEN}@github.com/redpanda-data/cloudv2.git" /workdir/../cloudv2
      git -C /workdir/../cloudv2 checkout "$$CLOUDV2_SHA"
      git clone "https://x-access-token:$${GITHUB_TOKEN}@github.com/redpanda-data/console.git" /workdir/../console
      git -C /workdir/../console checkout "$$CONSOLE_SHA"
      ./taskw generate:apidescriptions
      if ! git diff --exit-code internal/schemagen/data/apidescriptions.yaml; then
        echo "apidescriptions.yaml drifted from upstream. Run './taskw generate:apidescriptions' locally and commit."
        exit 1
      fi
    plugins:
      - seek-oss/aws-sm#v2.3.2:
          json-to-env:
            - secret-id: sdlc/prod/buildkite/terraform_provider_redpanda
      - docker#v5.12.0:
          image: "golang:1.25.10"
          environment:
            - BUILDKITE=true
            - GITHUB_TOKEN
    depends_on:
      - lint

  - label: release:check
    key: release_check
    if: build.tag == null && build.branch == "main"
    command: |
      git config --global --add safe.directory /workdir
      ./taskw release:check
    plugins:
      - docker#v5.12.0:
          image: "golang:1.25.10"
          environment:
            - BUILDKITE=true
    depends_on:
      - lint

  - label: "release:snapshot"
    key: release_snapshot
    if: build.tag == null && (build.branch == "main" || build.pull_request.labels includes 'ci-ready')
    command: |
      git config --global --add safe.directory /workdir
      if ! command -v gpg >/dev/null 2>&1; then
        apt-get update -qq && apt-get install -y -qq gnupg
      fi
      ./taskw release:snapshot
    plugins:
      - seek-oss/aws-sm#v2.3.2:
          json-to-env:
            - secret-id: sdlc/prod/buildkite/terraform_provider_redpanda
      - docker#v5.12.0:
          image: "golang:1.25.10"
          propagate-environment: true
          environment:
            - BUILDKITE=true
            - GPG_PRIVATE_KEY
            - PASSPHRASE
            - GPG_FINGERPRINT
    depends_on:
      - lint

  - label: test_datasource_cluster
    key: test_datasource_cluster
    if: build.tag == null && build.pull_request.labels includes 'ci-ready'
    command: |
      ./taskw test:datasource:cluster
    plugins:
      - seek-oss/aws-sm#v2.3.2:
          json-to-env:
            - secret-id: sdlc/prod/buildkite/terraform_provider_redpanda
      - docker#v5.12.0:
          image: "golang:1.25.10"
          environment:
            - REDPANDA_CLIENT_ID
            - REDPANDA_CLIENT_SECRET
            - TF_LOG=DEBUG
    depends_on:
      - lint
      - unit
      - integration
  - label: test_service_account
    key: test_service_account
    if: build.tag == null && build.pull_request.labels includes 'ci-ready'

              required: true
        cloud_storage_bucket:
          required: true
          fields:
            arn:
              required: true
        cluster_security_group:
          required: true
          fields:
            arn:
              required: true
        connectors_node_group_instance_profile:
          required: true
          fields:
            arn:
              required: true
        connectors_security_group:
          required: true
          fields:
            arn:
              required: true
        k8s_cluster_role:
          required: true
          fields:
            arn:
              required: true
        node_security_group:
          required: true
          fields:
            arn:
              required: true
        permissions_boundary_policy:
          required: true
          fields:
            arn:
              required: true
        redpanda_agent_security_group:
          required: true
          fields:
            arn:
              required: true
        redpanda_connect_node_group_instance_profile:
          computed: false
          optional: true
          fields:
            arn:
              required: true
        redpanda_connect_security_group:
          computed: false
          optional: true
          fields:
            arn:
              required: true
        redpanda_node_group_instance_profile:
          required: true
          fields:

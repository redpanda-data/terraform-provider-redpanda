dataplane_api:
  computed_only: true

desired_redpanda_version:
  computed_only: true

# Desired-state input: present on ClusterCreate/ClusterUpdate only, never on the
# read shape. The server-reported status is the separate computed
# gcp_global_access_api_gateway_enabled field below.
gcp_enable_global_access_api_gateway:
  extra: true
  type: bool
  optional: true
  expand_proto_name: gcp_enable_global_access_api_gateway
  flatten_skip: true

# Server-reported status: present on the Cluster read shape only. The user's
# intent is expressed via the separate gcp_enable_global_access_api_gateway
# input field, which maps to ClusterCreate/ClusterUpdate. The pin keeps the
# value stable except when that input is toggled, when it re-derives server-side.
gcp_global_access_api_gateway_enabled:
  computed_only: true
  plan_modifiers: [PinStateUnlessGatewayChanges]

gcp_global_access_enabled:
  # Server-controlled, read-only: present on the Cluster read shape but NOT on
  # ClusterCreate or ClusterUpdate. The user has no way to set this; the cloud
  # platform owns the value.
  computed_only: true

gcp_private_service_connect:
  optional: true
  computed: true
  plan_modifiers: [UseStateForUnknown]
  fields:
    consumer_accept_list:
      required: true
      fields:
        source:
          required: true
          validator: PSCConsumerSource
    enabled:
      required: true
    global_access_enabled:
      required: true
    status:

kafka_connect:
  fields:
    enabled:
      default: false

rpsql:
  # Defer the message CEL rule (replicas>=1 when enabled) to apply: it runs on
  # raw config, before the replicas Default, so it would falsely reject configs
  # relying on the default (cf. user.mechanism).
  skip_proto_validation: true
  fields:
    # Default seeds on create; UseStateForUnknown carries the value across
    # updates when omitted (else replicas plans <1 and trips the CEL rule).
    enabled:
      default: false
      plan_modifiers: [UseStateForUnknown]
    replicas:
      default: 1
      plan_modifiers: [UseStateForUnknown]
    url:
      computed_only: true
      # Server derives on enable. Same sibling-rise pin as zones: stays unknown
      # across the enable rise so the server value lands, pins prior state every
      # other plan so an enabled cluster reaches an empty steady-state plan
      # (plain UseStateForUnknown would pin "" across enable and trip
      # inconsistent-result).
      plan_modifiers: [PinStateUnlessRpsqlEnables]
    version:
      computed_only: true
      # Same server-sets-on-enable class as url.
      plan_modifiers: [PinStateUnlessRpsqlEnables]
    zones:
      optional: true
      computed: true
      # The control plane assigns the first cluster zone on enable, so the
      # leaf must plan unknown across the enable rise for that value to land;
      # every other plan pins state (null included). Disable keeps the pin:
      # the leaf-expanded mask always carries rpsql.zones and an empty value
      # would trip the control plane's immutability check.
      plan_modifiers: [PinStateUnlessRpsqlEnables]

maintenance_window_config:
  fields:
    anytime:
      computed: false
      force_type: BoolAttribute
      optional: true
    day_hour:
      computed: false
      optional: true
      fields:
        day_of_week:
          computed: false
          optional: true
        hour_of_day:
          computed: true
          optional: true
    unspecified:
      computed_only: true
      force_type: BoolAttribute
      # Oneof variant of maintenance_window_config — terminal-null whenever
      # day_hour or anytime is selected. Classifier's UseNonNullStateForUnknown
      # default would churn perpetually; override to preserve state-null.
      plan_modifiers: [UseStateForUnknown]


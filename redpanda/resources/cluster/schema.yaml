message: ""

api_schema: Cluster
# Write-shape roots for description fallback: input fields absent from the
# Cluster read shape (e.g. gcp_enable_global_access_api_gateway) source their
# text from the create/update payloads.
api_write_schemas: [ClusterCreate, ClusterUpdate]
tf_name: Cluster

timeouts: [create, update, delete]

api:
  update:
    # Resource code computes a FieldMask diff between plan and prev state
    # and wraps the returned payload itself, so the generator returns the
    # payload type instead of the full request envelope.
    return_payload: true
    # ExpandUpdateWithMask diffs plan vs state into a sparse payload; the
    # cluster API tolerates partial messages.
    diff_mask: sparse
    # Top-level fields absent from the control plane's update path map
    # (mirrored in internal/clustermask) derive RequiresReplace; explicit
    # overrides that disagree are warned about at generation time.
    mask_contract: cluster

allow_deletion:
  computed: true
  default: false
  extra: true
  optional: true
  type: bool
  # GenerateMinimalResourceModel uses true so a half-created cluster can
  # still be destroyed by the next apply. Distinct from the apply-time
  # default of false.
  minimal_default: true

api_gateway_access:

aws_private_link:
  optional: true
  computed: true
  plan_modifiers: [UseStateForUnknown]
  fields:
    allowed_principals:
      required: true
      validator: "LengthAtLeast{n: 1}"
    connect_console:
      required: true
    enabled:
      required: true
    status:
      computed_only: true
    supported_regions:
      optional: true
      computed: true
    http_proxy_auth_mode:
      todo: true
    kafka_api_auth_mode:
      todo: true
    schema_registry_auth_mode:
      todo: true
azure_private_link:

  computed: true
  plan_modifiers: [UseStateForUnknown]
  fields:
    allowed_subscriptions:
      required: true
    connect_console:
      required: true
    enabled:
      required: true
    status:
      computed_only: true

    http_proxy_auth_mode:
      todo: true
    kafka_api_auth_mode:
      todo: true
    schema_registry_auth_mode:
      todo: true
cloud_provider:

message: ""
api_schema: CreateACLRequest
tf_name: ACL

api:
  # CreateACLRequest is a flat 7-field request — no payload wrapper,
  # all proto names == TF tags. Defaults handle CreateACL/CreateACLRequest.
  delete:
    # DeleteACLs is pluralized — overrides the default `DeleteACL` name.
    rpc: DeleteACLs
    request: DeleteACLsRequest

exclude_operations: [update]

resource_type:
  required: true
  description: "The type of the resource (TOPIC, GROUP, etc...) this ACL shall target"
  plan_modifiers: [RequiresReplace]
  validator: ACLResourceTypes

resource_name:
  required: true
  description: "The name of the resource this ACL entry will be on"
  plan_modifiers: [RequiresReplace]

resource_pattern_type:
  required: true
  description: "The pattern type of the resource. It determines the strategy how the provided resource name is matched (LITERAL, MATCH, PREFIXED, etc ...) against the actual resource names"
  plan_modifiers: [RequiresReplace]
  validator: ACLPatternTypes

# principal / host / operation / permission_type are echoed in the
# response but the legacy CRUD preserves the user-supplied values for
# state stability — flatten_skip keeps that behavior byte-identical.
principal:
  required: true
  flatten_skip: true
  description: "The principal to apply this ACL for (e.g., User:alice or RedpandaRole:admin)"
  plan_modifiers: [RequiresReplace]

host:
  required: true
  flatten_skip: true
  plan_modifiers: [RequiresReplace]

operation:
  required: true
  flatten_skip: true
  description: "The operation type that shall be allowed or denied (e.g READ)"
  plan_modifiers: [RequiresReplace]
  validator: ACLOperations

permission_type:
  required: true
  flatten_skip: true
  description: "The permission type. It determines whether the operation should be ALLOWED or DENIED"
  plan_modifiers: [RequiresReplace]
  validator: ACLPermissions

cluster_api_url:
  extra: true
  type: string
  required: true
  description: "The cluster API URL. Changing this will prevent deletion of the resource on the existing cluster. It is generally a better idea to delete an existing resource and create a new one than to change this value unless you are planning to do state imports"
  plan_modifiers: [RequiresReplace]

allow_deletion:
  extra: true
  type: bool
  optional: true
  computed: true
  default: false
  description: "When set to true, allows the resource to be removed from state even if the cluster is unreachable"

id:
  extra: true
  type: string
  computed_only: true

message: "ServerlessCluster represents a Redpanda Cloud serverless cluster"
api_schema: ServerlessCluster
tf_name: ServerlessCluster

timeouts: [create, update, delete]

# UpdateServerlessClusterRequest is flat — id / private_link_id /
# networking_config / tags are top-level fields. planFlatField handles
# SingleNested (networking_config), Map (tags), and proto3-optional
# string (private_link_id) directly.

api:
  update:
    # full: the request has no FieldMask field (tags / networking_config are
    # full replacements). ExpandUpdateWithMask returns the whole plan request;
    # the resource reads the mask only to skip the RPC when nothing changed
    # (e.g. a provider-only allow_deletion flip).
    diff_mask: full

name:
  required: true
  plan_modifiers: [RequiresReplace]

resource_group_id:
  required: true
  plan_modifiers: [RequiresReplace]

serverless_region:
  required: true
  plan_modifiers: [RequiresReplace]

private_link_id:
  optional: true
  computed: true

networking_config:
  optional: true
  computed: true
  fields:
    private:
      optional: true
      computed: true
    public:
      optional: true
      computed: true

tags:
  optional: true
  computed: false

id:
  computed_only: true

state:
  computed_only: true

kafka_api:
  computed_only: true
  fields:
    seed_brokers:
      computed_only: true
    private_seed_brokers:
      computed_only: true

schema_registry:
  computed_only: true
  fields:
    url:
      computed_only: true
    private_url:
      computed_only: true

dataplane_api:
  computed_only: true
  fields:
    url:
      computed_only: true
    private_url:
      computed_only: true

console_url:
  computed_only: true

console_private_url:
  computed_only: true

planned_deletion:
  computed_only: true

prometheus:
  computed_only: true
  fields:
    url:
      computed_only: true
    private_url:
      computed_only: true

cluster_api_url:
  extra: true
  type: string
  computed: true
  flatten_via: clusterAPIURLFromProto
  deprecation_message: "This field is deprecated and will be removed in a future version. Use dataplane_api.url instead."

allow_deletion:
  extra: true
  type: bool
  optional: true
  computed: true
  default: false


# --- New proto fields (auto-added by schemagen -todo) ---
ai_gateway:
  todo: true

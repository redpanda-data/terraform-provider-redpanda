message: "Topic represents a Kafka topic configuration"
api_schema: CreateTopicRequest.Topic
tf_name: Topic

api:
  delete:
    flat_field_map:
      topic_name: name

# Update RPC for Topic itself doesn't exist — config + partition resizes go
# through dedicated SetTopicConfigurations / SetTopicPartitions RPCs that
# stay hand-written in resource_topic.go.
exclude_operations: [update]

name:
  required: true
  description: "The name of the topic."
  plan_modifiers: [RequiresReplace]

partition_count:
  optional: true
  computed: true
  force_type: NumberAttribute
  description: "The number of partitions for the topic. This determines how the data is distributed across brokers. Increases are fully supported without data loss. Decreases will destroy and recreate the topic if allow_deletion is set to true (defaults to false)."
  plan_modifiers: [RequiresReplaceIfShrinking]

replication_factor:
  optional: true
  computed: true
  force_type: NumberAttribute
  description: "The replication factor for the topic, which defines how many copies of the data are kept across different brokers for fault tolerance."
  plan_modifiers: [RequiresReplace]

replica_assignments:
  optional: true
  computed: false
  flatten_skip: true
  description: "Manually specify broker ID assignments for partition replicas. If manually assigning replicas, both replication_factor and partition_count must be -1. Mutually exclusive with partition_count and replication_factor."
  plan_modifiers: [RequiresReplace]
  fields:
    partition_id:
      required: true
    replica_ids:
      required: true

configs:
  exclude: true

allow_deletion:
  extra: true
  type: bool
  optional: true
  computed: true
  default: false
  description: "Indicates whether the topic can be deleted."

configuration:
  extra: true
  type: map_string
  optional: true
  computed: true
  description: "A map of string key/value pairs of topic configurations."

cluster_api_url:
  extra: true
  type: string
  required: true
  description: "The cluster API URL. Changing this will prevent deletion of the resource on the existing cluster. It is generally a better idea to delete an existing resource and create a new one than to change this value unless you are planning to do state imports"
  plan_modifiers: [RequiresReplace]

id:
  extra: true
  type: string
  computed_only: true
  from_proto: name

message: "Topic represents a Kafka topic configuration"
api_schema: CreateTopicRequest.Topic
tf_name: Topic
version: 1

api:
  delete:
    flat_field_map:
      topic_name: name

# Update RPC for Topic itself doesn't exist — config + partition resizes go
# through dedicated SetTopicConfigurations / SetTopicPartitions RPCs that
# stay hand-written in resource_topic.go.
exclude_operations: [update]

name:
  required: true
  plan_modifiers: [RequiresReplace]

partition_count:
  optional: true
  computed: true
  force_type: NumberAttribute
  plan_modifiers: [RequiresReplaceIfShrinking]

replication_factor:
  optional: true
  computed: true
  force_type: NumberAttribute
  plan_modifiers: [RequiresReplace]

replica_assignments:
  optional: true
  computed: false
  flatten_skip: true
  plan_modifiers: [RequiresReplace]
  fields:
    partition_id:
      required: true
    replica_ids:
      required: true

configs:
  exclude: true

allow_deletion:
  extra: true
  type: bool
  optional: true
  computed: true
  default: false

configuration:
  extra: true
  type: map_string
  optional: true
  computed: true

cluster_api_url:
  extra: true
  type: string
  required: true
  plan_modifiers: [RequiresReplace]

id:
  extra: true
  type: string
  computed_only: true
  from_proto: name

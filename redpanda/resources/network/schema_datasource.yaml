message: "Data source for a Redpanda Cloud network"
api_schema: Network
tf_name: Network
computed_default: true

id:
  required: true

name:

cidr_block:
  validator: CIDRBlockRegex
  flatten_via: cidrBlockFromProto

region:

cloud_provider:
  validator: "OneOf{values: |gcp|aws}"

resource_group_id:

cluster_type:
  validator: "OneOf{values: |dedicated|cloud}"

state:

customer_managed_resources:
  fields:
    aws:
      fields:
        management_bucket:
          fields:
            arn:
              required: true
        dynamodb_table:
          fields:
            arn:
              required: true
        vpc:
          fields:
            arn:
              required: true
        private_subnets:
          fields:
            arns:
              required: true
    gcp:
      fields:
        network_name:
        network_project_id:
        management_bucket:
          fields:
            name:
              required: true

    azure:
      todo: true


# --- New proto fields (auto-added by schemagen -todo) ---
egress_spec:
  todo: true
cloud_provider_access_id:
  todo: true

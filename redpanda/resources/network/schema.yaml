message: "Network represents a Redpanda Cloud managed network"
api_schema: Network
tf_name: Network
timeouts: [create, delete]

# Network has no Update RPC; every mutable schema field is RequiresReplace.
exclude_operations: [update]

name:
  required: true
  description: "Name of the network"
  plan_modifiers: [RequiresReplace]

cidr_block:
  optional: true
  computed: false
  description: "The cidr_block to create the network in"
  plan_modifiers: [RequiresReplace]
  validator: CIDRBlock
  flatten_via: cidrBlockFromProto

region:
  required: true
  description: "The region to create the network in."
  plan_modifiers: [RequiresReplace]

cloud_provider:
  required: true
  description: "The cloud provider to create the network in."
  plan_modifiers: [RequiresReplace]
  validator: CloudProviders

resource_group_id:
  required: true
  description: "The ID of the resource group in which to create the network"
  plan_modifiers: [RequiresReplace]

cluster_type:
  required: true
  description: "The type of cluster this network is associated with, can be one of dedicated or byoc"
  plan_modifiers: [RequiresReplace]
  validator: ClusterTypes

customer_managed_resources:
  optional: true
  computed: false
  fields:
    aws:
      optional: true
      computed: false
      plan_modifiers: [RequiresReplace]
      fields:
        management_bucket:
          required: true
          fields:
            arn:
              required: true
        dynamodb_table:
          required: true
          fields:
            arn:
              required: true
        vpc:
          required: true
          fields:
            arn:
              required: true
        private_subnets:
          required: true
          fields:
            arns:
              required: true
              description: "AWS private subnet identifiers"
    gcp:
      optional: true
      computed: false
      plan_modifiers: [RequiresReplace]
      fields:
        network_name:
          required: true
          validator:
            - GCPResourceName
            - "LengthAtMost{n: 62}"
        network_project_id:
          required: true
          validator:
            - GCPResourceName
            - "LengthAtMost{n: 30}"
        management_bucket:
          required: true
          fields:
            name:
              required: true
              description: "GCP storage bucket name for storing the state of Redpanda cluster deployment"

    azure:
      todo: true
# Response-only fields (present on Network but not NetworkCreate). The
# per-RPC payload-type divergence pass skips these automatically when
# emitting the Create expander — no extra wiring needed.

id:
  computed_only: true
  description: "The ID of the network"

state:
  computed_only: true
  description: "Current state of the network."

zones:
  computed_only: true


# --- New proto fields (auto-added by schemagen -todo) ---
egress_spec:
  todo: true

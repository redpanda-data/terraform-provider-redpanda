message: "Network represents a Redpanda Cloud managed network"
api_schema: Network
tf_name: Network
timeouts: [create, delete]

# Network has no Update RPC; every mutable schema field is RequiresReplace.
exclude_operations: [update]

name:
  required: true
  plan_modifiers: [RequiresReplace]

cidr_block:
  optional: true
  computed: false
  plan_modifiers: [RequiresReplace]
  validator: CIDRBlock
  flatten_via: cidrBlockFromProto

region:
  required: true
  plan_modifiers: [RequiresReplace]

cloud_provider:
  required: true
  plan_modifiers: [RequiresReplace]
  validator: CloudProviders

resource_group_id:
  required: true
  plan_modifiers: [RequiresReplace]

cluster_type:
  required: true
  plan_modifiers: [RequiresReplace]
  validator: ClusterTypes

customer_managed_resources:
  optional: true
  computed: false
  fields:
    aws:
      optional: true
      computed: false
      plan_modifiers: [RequiresReplace]
      fields:
        management_bucket:
          required: true
          fields:
            arn:
              required: true
        dynamodb_table:
          required: true
          fields:
            arn:
              required: true
        vpc:
          required: true
          fields:
            arn:
              required: true
        private_subnets:
          required: true
          fields:
            arns:
              required: true
    gcp:
      optional: true
      computed: false
      plan_modifiers: [RequiresReplace]
      fields:
        network_name:
          required: true
          validator:
            - GCPResourceName
            - "LengthAtMost{n: 62}"
        network_project_id:
          required: true
          validator:
            - GCPResourceName
            - "LengthAtMost{n: 30}"
        management_bucket:
          required: true
          fields:
            name:
              required: true

    azure:
      todo: true
# Response-only fields (present on Network but not NetworkCreate). The
# per-RPC payload-type divergence pass skips these automatically when
# emitting the Create expander — no extra wiring needed.

id:
  computed_only: true

state:
  computed_only: true

zones:
  computed_only: true


# --- New proto fields (auto-added by schemagen -todo) ---
egress_spec:
  todo: true
cloud_provider_access_id:
  todo: true

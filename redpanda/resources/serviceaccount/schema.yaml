message: "A Redpanda Cloud service account (machine identity)"
api_schema: ServiceAccount
tf_name: ServiceAccount

timeouts: [create, update, delete]

api:
  # role_bindings is extra/synthetic (Create-only proto field) and threaded
  # onto the payload after ExpandCreate by the resource code. The validator
  # needs to see the same payload shape Apply does, so the generated
  # proto-validator calls this hook between Expand and Validate.
  post_expand_hook: serviceaccountmodel.ThreadCreateExtras
  update:
    # Resource code computes a FieldMask diff between plan and prev state
    # and wraps the returned payload, so the generator returns the
    # ServiceAccountUpdate payload type instead of the full request envelope.
    return_payload: true
    # full (not sparse): the service account API runs buf.validate on every
    # field regardless of the FieldMask, so a sparse payload's zero-valued
    # unchanged `name` would trip string.min_len. Send the whole plan payload.
    diff_mask: full

id:
  computed_only: true

name:
  required: true

description:
  required: true

# auth0_client_credentials is server-generated. client_id is returned on every
# Get/List; client_secret is proto3-optional and returned only in the Create
# response (debug_redact omits it from subsequent reads). The generator's
# three-arm nested Flatten handles the lifecycle: HasClientSecret() → use
# proto's value (Create path); else if prev not unknown → carry prev (Read /
# Update path, where the server omits the field); else → null (fresh Import
# with no prior state). sensitive masks it in state.
auth0_client_credentials:
  computed_only: true
  fields:
    client_id:
      computed_only: true
    client_secret:
      computed_only: true
      sensitive: true

# role_bindings is Create-only on the proto side (ServiceAccountCreate carries
# it; the canonical ServiceAccount and ServiceAccountUpdate do not), and the
# backend requires at least one binding at create. Declared extra/synthetic
# because the schema walker only sees the canonical message; the
# post_expand_hook threads it onto the Create payload, and the server never
# echoes it so the resource code carries the config value forward.
# RequiresReplace: bindings attached at create cannot be changed through this
# resource — manage post-create grants with redpanda_role_binding instead.
role_bindings:
  extra: true
  synthetic: true
  type: list_nested
  optional: true
  plan_modifiers: [RequiresReplace]
  fields:
    role_name:
      required: true
      type: string
    scope:
      required: true
      fields:
        resource_type:
          required: true
          type: string
        resource_id:
          required: true
          type: string
        dataplane_id:
          optional: true
          type: string

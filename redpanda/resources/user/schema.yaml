message: "User is a user that can be created in Redpanda"
api_schema: CreateUserRequest.User
tf_name: User
version: 1

name:
  required: true
  plan_modifiers: [RequiresReplace]
  description: "Name of the user, must be unique"

password:
  optional: true
  computed: false
  sensitive: true
  expand_via: GetEffectivePassword
  flatten_skip: true
  deprecation_message: "Use password_wo instead to avoid storing password in Terraform state"
  description: "Password of the user. Deprecated: use password_wo instead to avoid storing password in state."
  validator: "Password{field1: password, field2: password_wo}"
  # Proto marks password required, but TF allows the alternate password_wo
  # write-only path. The Password{} TF validator above enforces "at least
  # one of password / password_wo" at plan time. Skip the proto-rule
  # check so plan doesn't reject configs that only set password_wo.
  skip_proto_validation: true

mechanism:
  optional: true
  computed: true
  has_presence: true
  plan_modifiers: [UseStateForUnknown]
  description: "Which authentication method to use, see https://docs.redpanda.com/current/manage/security/authentication/ for more information"
  validator: "OneOf{values: |scram-sha-256|scram-sha-512}"
  # Proto marks mechanism required, but TF treats it as Optional+Computed so
  # the server-supplied default surfaces in state. The OneOf{} validator
  # constrains accepted values; the proto's required rule would reject
  # configs that legitimately rely on the server default.
  skip_proto_validation: true

id:
  extra: true
  type: string
  computed_only: true
  from_proto: name

cluster_api_url:
  extra: true
  type: string
  required: true
  plan_modifiers: [RequiresReplace]
  description: >-
    The cluster API URL. Changing this will prevent deletion of the resource
    on the existing cluster. It is generally a better idea to delete an
    existing resource and create a new one than to change this value unless
    you are planning to do state imports

password_wo:
  extra: true
  type: string
  optional: true
  write_only: true
  description: "Password of the user (write-only, not stored in state). Requires Terraform 1.11+. Either password or password_wo must be set."

password_wo_version:
  extra: true
  type: int64
  optional: true
  description: "Version number for password_wo. Increment this value to trigger a password update when using password_wo."

allow_deletion:
  extra: true
  type: bool
  optional: true
  computed: true
  default: false
  description: "Allows deletion of the user. If false, the user cannot be deleted and the resource will be removed from the state on destruction. Defaults to false."

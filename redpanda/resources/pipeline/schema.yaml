message: "Pipeline represents a Redpanda Connect pipeline"
api_schema: Pipeline
tf_name: Pipeline

timeouts: [create, update, delete]

id:
  computed_only: true

display_name:
  required: true
  validator: "StringLengthAtLeast{n: 1}"

description:
  optional: true
  computed: false

config_yaml:
  required: true
  sensitive: true

resources:
  optional: true
  computed: true
  # API canonicalizes memory_shares/cpu_shares (e.g. echoes "1200M" when the
  # user wrote "256Mi"). Without flatten_from_prev, state drifts on every plan
  # because the proto echo disagrees with the user's input. The directive
  # restores the user's planned value over the canonicalized echo. Nested
  # write_only and extra fields auto-preserve from prev without any directive.
  flatten_from_prev: true
  fields:
    memory_shares:
      optional: true
      validator: MemorySharesValidator
      skip_proto_validation: true
    cpu_shares:
      optional: true
      validator: CPUSharesValidator
      skip_proto_validation: true

tags:
  optional: true
  computed: false

service_account:
  optional: true
  computed: false
  plan_modifiers: [UseStateForUnknown]
  fields:
    client_id:
      required: true
    client_secret:
      required: true
      write_only: true
      flatten_skip: true
    secret_version:
      extra: true
      type: int64
      optional: true
      plan_modifiers: [UseStateForUnknown]
      description: "Version number for client_secret. Increment to trigger a secret update."

state:
  optional: true
  computed: true
  proto_enum: Pipeline_State
  default: "stopped"
  validator: "OneOf{values: |running|stopped}"
  flatten_via: FlattenDesiredState
  description: "Desired state of the pipeline: 'running' or 'stopped'. The provider will ensure the pipeline reaches this state after create/update operations."

status:
  computed_only: true
  fields:
    error:
      computed_only: true

url:
  computed_only: true

cluster_api_url:
  extra: true
  type: string
  required: true
  plan_modifiers: [RequiresReplace]
  description: >-
    The cluster API URL. Changing this will prevent deletion of the resource on the existing
    cluster. It is generally a better idea to delete an existing resource and create a new one
    than to change this value unless you are planning to do state imports.

allow_deletion:
  extra: true
  type: bool
  optional: true
  computed: true
  default: false
  description: "Allows deletion of the pipeline. Default is false. Must be set to true to delete the resource."

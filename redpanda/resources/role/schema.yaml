message: "Redpanda Cloud RBAC role"
api_schema: Role
tf_name: Role

api:
  delete:
    flat_field_map:
      role_name: name                   # proto role_name → TF tag "name"

exclude_operations: [update]            # roles are immutable

name:
  required: true
  description: "Name of the role, must be unique"
  plan_modifiers: [RequiresReplace]

id:
  extra: true
  type: string
  computed_only: true

cluster_api_url:
  extra: true
  type: string
  required: true
  description: "The cluster API URL. Changing this will prevent deletion of the resource on the existing cluster. It is generally a better idea to delete an existing resource and create a new one than to change this value unless you are planning to do state imports"
  plan_modifiers: [RequiresReplace]

allow_deletion:
  extra: true
  type: bool
  optional: true
  computed: true
  default: false
  description: "Allows deletion of the role. If false, the role cannot be deleted and the resource will be removed from the state on destruction. Defaults to false."

delete_acls:
  extra: true
  type: bool
  optional: true
  computed: true
  default: false
  description: "Whether to delete the ACLs bound to the role when the role is deleted. Defaults to false."

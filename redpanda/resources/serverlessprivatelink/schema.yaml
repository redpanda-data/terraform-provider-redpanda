message: "Manages a Redpanda Serverless Private Link"
api_schema: ServerlessPrivateLink
tf_name: ServerlessPrivateLink

timeouts: [create, update, delete]

# UpdateServerlessPrivateLinkRequest is flat — id + aws_config (oneof
# variant) are top-level. The generator emits SetAwsConfig(...) for the
# oneof variant; per-RPC divergence routes through ExpandUpdateAwsConfig.

name:
  required: true
  description: "Name of the serverless private link"
  plan_modifiers: [RequiresReplace]

resource_group_id:
  required: true
  description: "The ID of the Resource Group in which to create the serverless private link"
  plan_modifiers: [RequiresReplace]

cloudprovider:
  rename: cloud_provider
  required: true
  description: "Cloud provider (aws)"
  plan_modifiers: [RequiresReplace]
  validator: CloudProviders

serverless_region:
  required: true
  description: "Redpanda serverless region"
  plan_modifiers: [RequiresReplace]

# Proto oneof variant under the parent's cloud_provider_config oneof.
# The 4.1 setter-based emission writes via SetAwsConfig; per-RPC
# nested-type divergence routes Create/Update to their own
# ExpandCreateAwsConfig / ExpandUpdateAwsConfig.
aws_config:
  optional: true
  computed: true
  description: "AWS-specific configuration. Required when cloud_provider is 'aws'."
  fields:
    allowed_principals:
      required: true
      description: "AWS principals (ARNs) allowed to connect to the private link endpoint"
      validator: "ListSizeAtLeast{n: 1}"

    allowed_regions:
      todo: true

# Deprecated tombstone for main's cloud_provider_config { aws { allowed_principals } }
# wrapper. Synthetic (no proto backing) — it exists only so a config still written
# in the old shape parses and then hard-fails via the validator with a migrate
# message, instead of a bare "Unsupported argument". aws_config is the real field.
cloud_provider_config:
  synthetic: true
  deprecated: true
  extra: true
  optional: true
  validator: ServerlessPrivateLinkConfigRemoved
  deprecation_message: |-
    cloud_provider_config has been replaced by aws_config. Move your configuration from cloud_provider_config.aws to aws_config.

    None of this serverless private link resource's attributes are marked RequiresReplace, so updating in place is safe. To guarantee the transition will be a no-op, use terraform state rm followed by terraform import on each affected serverless private link resource:

      terraform state rm redpanda_serverless_private_link.<resource_name>
      terraform import redpanda_serverless_private_link.<resource_name> <serverless_private_link_id>
  fields:
    aws:
      optional: true
      fields:
        allowed_principals:
          optional: true
          type: list_string

allow_deletion:
  extra: true
  type: bool
  optional: true
  computed: true
  default: false
  description: "Allows deletion of the serverless private link. Defaults to false."

id:
  computed_only: true
  description: "The ID of the serverless private link"

state:
  computed_only: true
  description: "Current state of the serverless private link (STATE_CREATING, STATE_READY, STATE_DELETING, STATE_FAILED, STATE_UPDATING)"

# Status proto shape: ServerlessPrivateLinkStatus { cloud_provider oneof
# { aws *ServerlessPrivateLinkStatus_AWS } }. The 4.1 oneof machinery
# emits FlattenStatusAWS + SetAws into the parent.
status:
  computed_only: true
  description: "Cloud provider specific status information"
  fields:
    aws:
      computed: true
      description: "AWS-specific status information"
      fields:
        vpc_endpoint_service_name:
          computed_only: true
          description: "VPC endpoint service name for connecting to the private link"
        availability_zones:
          computed_only: true
          description: "Availability zones where the private link endpoint service is available"
